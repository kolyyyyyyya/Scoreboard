<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d1b2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Scoreboard</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"Scoreboard","short_name":"Scoreboard","display":"standalone","orientation":"portrait","background_color":"%230d1b2a","theme_color":"%230d1b2a","start_url":"."}'>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230d1b2a'/%3E%3Ctext x='90' y='128' font-size='110' text-anchor='middle' fill='%23e8c547' font-family='Georgia'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0d1b2a;
    --gold: #e8c547;
    --ink: #f0f3f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    position: fixed;
    inset: 0;
    width: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select: none;
  }
  .board {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr;
    min-height: 0;
  }
  .board.quad { grid-template-columns: 1fr 1fr; }
  .team {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    min-height: 0;
    min-width: 0;
  }
  .team:active { filter: brightness(1.15); }
  .team[data-i="2"], .team[data-i="3"] { display: none; }
  .board.quad .team[data-i="2"], .board.quad .team[data-i="3"] { display: flex; }
  .name {
    position: absolute;
    top: max(1.2vh, 10px);
    max-width: 86%;
    overflow: hidden;
    white-space: nowrap;
    font-size: clamp(0.85rem, 3.8vw, 1.5rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.14);
    padding: 5px 14px;
    border-radius: 100px;
    cursor: text;
  }
  .board.quad .name { font-size: clamp(0.75rem, 3vw, 1.1rem); }
  .name:empty::before { content: attr(data-ph); color: rgba(255,255,255,0.5); }
  .score {
    font-family: 'Georgia', serif;
    font-weight: 700;
    font-size: clamp(4rem, 30vw, 15rem);
    line-height: 0.9;
    font-variant-numeric: tabular-nums;
    color: #fff;
    text-shadow: 0 4px 24px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  .board.quad .score { font-size: clamp(3rem, 18vw, 9rem); }
  .minus {
    position: absolute;
    bottom: max(1vh, 10px);
    right: max(2.5vw, 12px);
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.18);
    color: #fff;
    font-size: 1.5rem;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .minus:active { background: rgba(0,0,0,0.4); }
  .bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px max(3vw, 12px);
    background: #071320;
    gap: 8px;
  }
  .bar .divider {
    font-family: 'Georgia', serif;
    font-size: clamp(0.85rem, 3.6vw, 1.1rem);
    color: var(--gold);
    letter-spacing: 0.06em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .btn {
    flex: 0 0 auto;
    background: none;
    border: 1px solid rgba(240,243,247,0.28);
    color: var(--ink);
    padding: 9px 14px;
    border-radius: 100px;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn:active { background: rgba(240,243,247,0.1); }
  .btn.reset { border-color: rgba(226,92,92,0.5); color: #d36b74; }
  .btn.reset.armed { background: #a23e48; border-color: #a23e48; color: #fff; }
</style>
</head>
<body>
  <div class="board" id="board"></div>
  <div class="bar">
    <button class="btn" id="stepBtn">+1</button>
    <button class="btn" id="modeBtn">4 teams</button>
    <span class="divider" id="total"></span>
    <button class="btn reset" id="resetBtn">Reset</button>
  </div>

<script>
  const COLORS = ['#2a6f97', '#a23e48', '#3a7d44', '#6d4c9f'];
  const PLACEHOLDERS = ['Team 1', 'Team 2', 'Team 3', 'Team 4'];
  const KEY = 'scoreboard.v2';
  const steps = [1, 2, 3];

  const state = {
    mode: 2,
    step: 1,
    teams: [
      { score: 0, name: '' }, { score: 0, name: '' },
      { score: 0, name: '' }, { score: 0, name: '' }
    ]
  };

  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY));
      if (s && Array.isArray(s.teams) && s.teams.length === 4) Object.assign(state, s);
      else {
        // migrate from the old 2-team version
        const old = JSON.parse(localStorage.getItem('scoreboard.v1'));
        if (old) {
          state.teams[0] = { score: old.home || 0, name: old.homeName || '' };
          state.teams[1] = { score: old.away || 0, name: old.awayName || '' };
          state.step = old.step || 1;
        }
      }
    } catch (e) {}
  }
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
  }
  function buzz() { if (navigator.vibrate) navigator.vibrate(12); }
  function unstick() { window.scrollTo(0, 0); document.body.scrollTop = 0; }
  function active() { return state.teams.slice(0, state.mode); }

  // Build the four panels once
  const panels = [];
  COLORS.forEach((color, i) => {
    const el = document.createElement('div');
    el.className = 'team';
    el.dataset.i = i;
    el.style.background = color;
    el.innerHTML =
      '<div class="name" contenteditable="true" data-ph="' + PLACEHOLDERS[i] + '"></div>' +
      '<div class="score">0</div>' +
      '<div class="minus">\u2212</div>';
    board.appendChild(el);

    const nameEl = el.querySelector('.name');
    const scoreEl = el.querySelector('.score');
    const minusEl = el.querySelector('.minus');
    panels.push({ el, nameEl, scoreEl });

    el.addEventListener('click', (e) => {
      if (e.target === minusEl || e.target === nameEl) return;
      state.teams[i].score = Math.max(0, state.teams[i].score + state.step);
      buzz(); save(); render();
    });
    minusEl.addEventListener('click', (e) => {
      e.stopPropagation();
      state.teams[i].score = Math.max(0, state.teams[i].score - state.step);
      buzz(); save(); render();
    });
    nameEl.addEventListener('input', () => {
      state.teams[i].name = nameEl.textContent.trim();
      save();
    });
    nameEl.addEventListener('blur', () => {
      nameEl.textContent = state.teams[i].name;
      unstick();
    });
  });

  function render() {
    board.classList.toggle('quad', state.mode === 4);
    panels.forEach((p, i) => {
      p.scoreEl.textContent = state.teams[i].score;
      if (document.activeElement !== p.nameEl) p.nameEl.textContent = state.teams[i].name;
    });
    total.textContent = active().map(t => t.score).join(' \u2013 ');
    stepBtn.textContent = '+' + state.step;
    modeBtn.textContent = state.mode === 2 ? '4 teams' : '2 teams';
  }

  stepBtn.addEventListener('click', () => {
    state.step = steps[(steps.indexOf(state.step) + 1) % steps.length];
    save(); render();
  });

  modeBtn.addEventListener('click', () => {
    state.mode = state.mode === 2 ? 4 : 2;
    buzz(); save(); render();
  });

  let armTimer = null;
  resetBtn.addEventListener('click', () => {
    if (active().every(t => t.score === 0)) return;
    if (resetBtn.classList.contains('armed')) {
      active().forEach(t => t.score = 0);
      buzz(); save(); render();
      disarm();
    } else {
      resetBtn.classList.add('armed');
      resetBtn.textContent = 'Sure?';
      armTimer = setTimeout(disarm, 3000);
    }
  });
  function disarm() {
    clearTimeout(armTimer);
    resetBtn.classList.remove('armed');
    resetBtn.textContent = 'Reset';
  }

  if (window.visualViewport) {
    visualViewport.addEventListener('resize', () => {
      if (!panels.some(p => document.activeElement === p.nameEl)) unstick();
    });
  }
  document.addEventListener('dblclick', e => e.preventDefault());
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('sw.js');
  }
  load(); render();
</script>
</body>
</html>
